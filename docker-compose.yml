services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: rpg-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rpg-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: rpgmaster
      POSTGRES_USER: rpgmaster
      POSTGRES_PASSWORD: rpgmaster
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rpgmaster -d rpgmaster']
      interval: 10s
      timeout: 5s
      retries: 5

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: rpg-open-webui
    ports:
      - '3000:8080'
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: rpg-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    extra_hosts:
      # Makes host.docker.internal resolvable on Linux; no-op on Docker Desktop.
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: rpg-grafana
    ports:
      - '3001:3000'
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  open_webui_data:
  prometheus_data:
  grafana_data:
