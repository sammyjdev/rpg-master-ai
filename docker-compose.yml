services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: rpg-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rpg-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: rpgmaster
      POSTGRES_USER: rpgmaster
      POSTGRES_PASSWORD: rpgmaster
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rpgmaster -d rpgmaster']
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: rpg-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: rpg-open-webui
    ports:
      - '3000:8080'
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  ollama_data:
  open_webui_data:
