global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: rpg-master-ai

scrape_configs:
  - job_name: rpg-master-app
    metrics_path: /actuator/prometheus
    # The Spring Boot app runs on the host (not in Compose) — `host.docker.internal`
    # works out of the box on Docker Desktop and is mapped via extra_hosts on Linux.
    static_configs:
      - targets:
          - host.docker.internal:8082
