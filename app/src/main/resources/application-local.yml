spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rpgmaster
    username: rpgmaster
    password: rpgmaster
    driver-class-name: org.postgresql.Driver

  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: bge-m3
        options:
          num-ctx: 2048
      chat:
        model: qwen2.5:7b
        options:
          temperature: 0.1
          num-ctx: 8192

rpg:
  ingestion:
    # Dev-only /v1/ingest path allowlist. See ADR-013.
    # Any request path that does not resolve under one of these roots is rejected.
    allowed-roots:
      - ${user.home}/rpg-corpus

logging:
  level:
    com.rpgmaster: DEBUG
    org.springframework.ai.ollama: DEBUG
