spring:
  application:
    name: rpg-master-app

  # Flyway manages schema — never use ddl-auto=create
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Java 21 Virtual Threads — always on
  threads:
    virtual:
      enabled: true

# Qdrant gRPC connection
qdrant:
  host: localhost
  port: 6334

# RAG retrieval defaults — single source of truth for REST and CLI
rpg:
  retrieval:
    top-k: 8
    similarity-threshold: 0.3

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: ${spring.application.name}

# Spring Shell prompt
spring.shell:
  interactive:
    enabled: true
  script:
    enabled: false

logging:
  level:
    com.rpgmaster: INFO
    org.springframework.ai: INFO
    io.qdrant: WARN
